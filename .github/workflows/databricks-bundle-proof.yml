name: Databricks Bundle Proof

on:
  # Enable after the market dashboard export/upload flow is concrete:
  # schedule:
  #   - cron: "17 * * * *"   # hourly market refresh
  #   - cron: "43 2 * * *"   # daily cleanup
  push:
    branches:
      - main
    paths:
      - ".github/workflows/databricks-bundle-proof.yml"
      - "databricks.yml"
      - "frontend/**"
      - "ingestion/**"
      - "resources/**"
      - "src/**"
  workflow_dispatch:
    inputs:
      target:
        description: Databricks bundle target to validate, deploy, and run.
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      run_job:
        description: Deploy and run the Databricks job after validation.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      bundle_job:
        description: Bundle job to run when run_job is true.
        required: true
        default: "proof_job"
        type: choice
        options:
          - proof_job
          - market_data_job
          - cleanup_proof_tables

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: databricks-free-proof-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
  cancel-in-progress: false

jobs:
  bundle-proof:
    name: Validate, deploy, and optionally run bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
    env:
      BUNDLE_TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
      RUN_JOB: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_job || github.event_name == 'schedule' && 'true' || 'false' }}
      BUNDLE_JOB: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bundle_job || github.event_name == 'schedule' && github.event.schedule == '43 2 * * *' && 'cleanup_proof_tables' || github.event_name == 'schedule' && 'market_data_job' || 'proof_job' }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Set up Python
        if: ${{ env.RUN_JOB == 'true' && env.BUNDLE_JOB == 'market_data_job' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch market data batch
        if: ${{ env.RUN_JOB == 'true' && env.BUNDLE_JOB == 'market_data_job' }}
        run: python ingestion/run_pipeline.py --output sample_data/latest_market_batch.jsonl

      - name: Validate bundle
        run: databricks bundle validate --target "$BUNDLE_TARGET"

      - name: Deploy bundle
        if: ${{ env.RUN_JOB == 'true' }}
        run: databricks bundle deploy --target "$BUNDLE_TARGET"

      - name: Run bundle job
        if: ${{ env.RUN_JOB == 'true' }}
        run: databricks bundle run --target "$BUNDLE_TARGET" "$BUNDLE_JOB"

      - name: Export market dashboard JSON
        if: ${{ env.RUN_JOB == 'true' && env.BUNDLE_JOB == 'market_data_job' }}
        run: python ingestion/export_market_dashboard.py --target "$BUNDLE_TARGET" --output frontend/latest_market_summary.json

      - name: Upload market dashboard JSON to Cloudflare KV
        if: ${{ env.RUN_JOB == 'true' && env.BUNDLE_JOB == 'market_data_job' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_KV_NAMESPACE_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: python ingestion/upload_cloudflare_kv.py --input frontend/latest_market_summary.json

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (env.RUN_JOB == 'true' && env.BUNDLE_JOB == 'market_data_job') }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

  deploy-pages:
    name: Deploy dashboard to GitHub Pages
    needs: bundle-proof
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_job == 'true' && github.event.inputs.bundle_job == 'market_data_job') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Prepare GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
