name: Databricks Bundle Proof

on:
  workflow_dispatch:
    inputs:
      target:
        description: Databricks bundle target to validate, deploy, and run.
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      run_job:
        description: Deploy and run the Databricks job after validation.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: databricks-free-proof-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  bundle-proof:
    name: Validate, deploy, and optionally run bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target ${{ inputs.target }}

      - name: Deploy bundle
        if: ${{ inputs.run_job == 'true' }}
        run: databricks bundle deploy --target ${{ inputs.target }}

      - name: Run proof job
        if: ${{ inputs.run_job == 'true' }}
        run: databricks bundle run --target ${{ inputs.target }} proof_job
