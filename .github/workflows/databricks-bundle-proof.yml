name: Databricks Bundle Proof

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/databricks-bundle-proof.yml"
      - "databricks.yml"
      - "resources/**"
      - "src/**"
  workflow_dispatch:
    inputs:
      target:
        description: Databricks bundle target to validate, deploy, and run.
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      run_job:
        description: Deploy and run the Databricks job after validation.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: databricks-free-proof-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
  cancel-in-progress: false

jobs:
  bundle-proof:
    name: Validate, deploy, and optionally run bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
    env:
      BUNDLE_TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
      RUN_JOB: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_job || 'false' }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target "$BUNDLE_TARGET"

      - name: Deploy bundle
        if: ${{ env.RUN_JOB == 'true' }}
        run: databricks bundle deploy --target "$BUNDLE_TARGET"

      - name: Run proof job
        if: ${{ env.RUN_JOB == 'true' }}
        run: databricks bundle run --target "$BUNDLE_TARGET" proof_job
