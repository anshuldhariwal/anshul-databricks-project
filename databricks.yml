bundle:
  name: anshul_databricks_project

include:
  - resources/*.yml

variables:
  bundle_target:
    description: Logical deployment target used in job names and table names.
    default: dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      bundle_target: dev
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      bundle_target: prod
